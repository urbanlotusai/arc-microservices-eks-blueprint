apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app
  namespace: sample-tenant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sample-app
  template:
    metadata:
      labels:
        app: sample-app
    spec:
      containers:
        - name: sample-app
          image: REPLACE_WITH_ECR_URL:latest
          ports:
            - containerPort: 8080
          env:
            - name: APP_VERSION
              value: "1.0.0"
            - name: DB_HOST
              value: "REPLACE_WITH_DB_ENDPOINT"    # terraform output db_cluster_endpoint
            - name: REDIS_HOST
              value: "REPLACE_WITH_REDIS_ENDPOINT"  # terraform output cache_cluster_address
            - name: SQS_QUEUE
              value: "REPLACE_WITH_SQS_URL"         # terraform output sqs_queue_url
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
